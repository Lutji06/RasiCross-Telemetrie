name: check

on:
  push:
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    env:
      # check-Job startet Electron nicht -> grossen Binary-Download sparen
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Syntax-check JS (CommonJS-Hauptprozess)
        run: |
          node --check main.js
          node --check preload.js
          node --check tiles.js
      - name: Lint JS
        run: npm run lint
      - name: Unit tests
        run: npm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Byte-compile ESP scripts (syntax only)
        run: python -m py_compile sender.py bridge.py esp_libs/*.py
      - name: Install Ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check
      - name: Pure-logic unit tests
        run: python -m unittest discover -s test -p "test_*.py" -v

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Playwright-Smoke (Vite-Build + Electron unter Xvfb)
        run: xvfb-run --auto-servernum -- npm run test:e2e
      - name: Testartefakte bei Fehlschlag
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore
