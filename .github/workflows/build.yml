# ============================================================
#  Baut die RasiCross-Telemetrie fuer Windows, macOS und Linux
# ============================================================
#  Loest aus bei:
#    - Push eines Tags der Form vX.Y.Z (z.B. v9.6.0)
#    - Pull-Request gegen main
#    - Manuelle Ausfuehrung ueber den "Actions"-Tab auf GitHub
#
#  Ergebnis bei Tag-Push: GitHub Release mit allen Builds:
#    Windows: RasiCross-Telemetry-Setup.exe + Portable.exe
#    macOS:   RasiCross-Telemetry-9.6.0.dmg + .zip
#    Linux:   RasiCross-Telemetry-9.6.0.AppImage
# ============================================================

name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # noetig fuer das Erstellen von Releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Stub icon.ico (falls keines im Repo liegt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path 'icon.ico')) {
            Write-Host 'Kein icon.ico - lege leeren Stub an, Default-Icon wird verwendet.'
            New-Item -ItemType File -Path 'icon.ico' -Force | Out-Null
          }

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w serialport
        continue-on-error: true

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: false
