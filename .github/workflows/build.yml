# ============================================================
#  Baut die RasiCross-Telemetrie als Windows-.exe
# ============================================================
#  Loest aus bei:
#    - Push eines Tags der Form vX.Y.Z (z.B. v9.6.0)
#    - Pull-Request gegen main
#    - Manuelle Ausfuehrung ueber den "Actions"-Tab auf GitHub
#
#  Ergebnis bei Tag-Push:
#    - dist/RasiCross Telemetry Setup 9.6.0.exe (NSIS-Installer)
#    - dist/RasiCross-Telemetry-Portable.exe
#    -> automatisch als GitHub Release mit den .exe-Dateien
# ============================================================

name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # noetig fuer das Erstellen von Releases

jobs:
  build:
    name: Windows-Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stub icon.ico (falls keines im Repo liegt)
        shell: pwsh
        run: |
          if (-not (Test-Path 'icon.ico')) {
            Write-Host 'Kein icon.ico - lege leeren Stub an, Default-Icon wird verwendet.'
            New-Item -ItemType File -Path 'icon.ico' -Force | Out-Null
          }

      - name: Install dependencies
        run: npm install

      - name: Build Windows installers
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kein Code-Signing-Zertifikat - electron-builder soll nicht versuchen zu signieren
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
