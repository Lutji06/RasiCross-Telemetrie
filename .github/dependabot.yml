# Dependabot prueft regelmaessig auf Updates und schickt PRs
# Doku: https://docs.github.com/code-security/dependabot

version: 2
updates:
  # NPM-Abhaengigkeiten (Electron, electron-builder, serialport, ...)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions (actions/checkout, setup-node, action-gh-release, ...)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
